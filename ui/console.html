<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="webkit" name="renderer" />
    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
      name="viewport"
    />
    <meta content="noindex,nofollow" name="robots" />
    <title></title>
    <link href="/ui-assets/favicon.ico" rel="shortcut icon" type="image/x-icon" />
    <link href="/ui-assets/favicon.ico" rel="icon" type="image/x-icon" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Prevent flash of wrong color theme (FOUC)
      (function () {
        const pref = localStorage.getItem("halo-dark-mode-preference");
        if (pref === "dark" || (!pref && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      body {
        height: 100%;
        background-color: #f5f5f5;
        color: #111827;
      }

      .dark body {
        background-color: #1f2937;
        color: #fafafa;
      }

      #loader {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        margin: auto;
        border: solid 3px #e5e7eb;
        border-top-color: #333;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 0.6s linear infinite;
      }

      .dark #loader {
        border-color: #3f3f46;
        border-top-color: #fafafa;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <strong>
        We're sorry but halo console client doesn't work properly without JavaScript enabled. Please enable it to
        continue.
      </strong>
    </noscript>
    <div id="app">
      <div id="loader"></div>
    </div>
    <script src="/console-src/main.ts" type="module"></script>
  </body>
</html>
