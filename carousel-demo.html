<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的校园博客</title>
  <style>
    /* 校园清新风格配色变量 */
    :root {
      --primary-color: #4A90E2;    /* 主色：清爽天蓝 */
      --secondary-color: #6BBF70;  /* 辅助色：嫩草绿 */
      --text-color: #333333;       /* 正文色：深灰，保证可读性 */
      --light-text: #666666;       /* 次要文字色：中灰 */
      --bg-color: #F8FAFC;         /* 背景色：米白，不刺眼 */
      --card-bg: #FFFFFF;          /* 卡片背景：纯白 */
      --border-color: #E2E8F0;     /* 边框色：浅灰 */
    }

    /* 全局样式 */
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
    }

    /* 头部导航栏（Logo+副标题） */
    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 20px;
      text-align: center;
    }

    /* Logo文字 */
    .site-logo {
      font-size: 28px;
      font-weight: bold;
      color: var(--primary-color);
      margin: 0;
    }

    /* 副标题 */
    .site-subtitle {
      font-size: 16px;
      color: var(--light-text);
      margin: 8px 0 0;
    }

    /* 轮播图容器 */
    .carousel {
      width: 100%;
      height: 400px;
      overflow: hidden;
      border-radius: 12px;
      margin: 30px auto;
      border: 1px solid var(--border-color);
      max-width: 1200px;
    }

    .carousel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 博客内容区 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 大卡片样式（封面图更突出） */
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden; /* 让封面图圆角生效 */
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    /* 卡片封面图 */
    .card-cover {
      width: 100%;
      height: 220px; /* 加大高度，让封面更突出 */
      object-fit: cover;
    }

    /* 卡片内容区 */
    .card-content {
      padding: 20px;
    }

    /* 卡片标题：加大加粗 */
    .card-title {
      font-size: 22px;
      font-weight: bold;
      color: var(--primary-color);
      margin: 0 0 10px;
    }

    /* 卡片摘要 */
    .card-excerpt {
      color: var(--light-text);
      line-height: 1.6;
      margin: 0 0 15px;
    }

    /* 卡片底部信息（发布时间+作者） */
    .card-meta {
      display: flex;
      justify-content: space-between;
      color: #94A3B8;
      font-size: 14px;
    }

    /* 页脚信息 */
    footer {
      background-color: var(--card-bg);
      border-top: 1px solid var(--border-color);
      padding: 20px;
      text-align: center;
      margin-top: 50px;
    }

    .footer-text {
      color: var(--light-text);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- 头部：Logo + 副标题 -->
  <header>
    <h1 class="site-logo">✨ 我的校园博客</h1>
    <p class="site-subtitle">记录校园生活 · 分享学习点滴 · 留下青春印记</p>
  </header>

  <!-- 轮播图模块 -->
  <div class="carousel">
    <img src="https://picsum.photos/1200/400?random=1" alt="校园活动轮播图">
  </div>

  <!-- 博客内容区：大卡片样式文章列表 -->
  <div class="container">
    <!-- 文章卡片1 -->
    <div class="card">
      <img class="card-cover" src="https://picsum.photos/800/400?random=2" alt="文章封面">
      <div class="card-content">
        <h3 class="card-title">校园生活分享：期末备考日常</h3>
        <p class="card-excerpt">记录在图书馆泡馆的日子，分享高效复习方法和心态调整技巧...</p>
        <div class="card-meta">
          <span>发布时间：2026-05-05</span>
          <span>作者：NiuYimin</span>
        </div>
      </div>
    </div>

    <!-- 文章卡片2 -->
    <div class="card">
      <img class="card-cover" src="https://picsum.photos/800/400?random=3" alt="文章封面">
      <div class="card-content">
        <h3 class="card-title">期末复习指南：各科重点梳理</h3>
        <p class="card-excerpt">整理了本学期各科的核心考点和复习计划，帮你高效备考不踩坑...</p>
        <div class="card-meta">
          <span>发布时间：2026-05-05</span>
          <span>作者：NiuYimin</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚信息 -->
  <footer>
    <p class="footer-text">© 2026 我的校园博客 | All Rights Reserved</p>
    <p class="footer-text"> Powered by Halo | 校园清新主题 v1.0</p>
  </footer>
</body>
</html>
